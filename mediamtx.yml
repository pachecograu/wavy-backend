# MediaMTX Configuration for WAVY Audio Streaming

# General settings
logLevel: info
logDestinations: [stdout]
logFile: mediamtx.log

# API settings
api: yes
apiAddress: 127.0.0.1:9997

# Metrics
metrics: yes
metricsAddress: 127.0.0.1:9998

# WebRTC settings
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcServerKey: server.key
webrtcServerCert: server.crt
webrtcAllowOrigin: "*"
webrtcTrustedProxies: []
webrtcICEServers2: []

# HLS settings (for web compatibility)
hls: yes
hlsAddress: :8888
hlsEncryption: no
hlsServerKey: server.key
hlsServerCert: server.crt
hlsAllowOrigin: "*"
hlsTrustedProxies: []
hlsAlwaysRemux: no
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: ""

# Path settings for audio streams
paths:
  # Default path for all streams
  ~^stream/.+:
    # Allow publishing (for emisors)
    publishUser: ""
    publishPass: ""
    publishIPs: []
    
    # Allow reading (for oyentes)
    readUser: ""
    readPass: ""
    readIPs: []
    
    # WebRTC specific settings
    webrtcDisable: no
    webrtcICEServers2: []
    
    # HLS specific settings
    hlsDisable: no
    hlsVariant: lowLatency
    hlsSegmentDuration: 1s
    hlsPartDuration: 200ms