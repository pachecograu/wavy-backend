<!DOCTYPE html>
<html>
<head>
    <title>Wavy Audio Test</title>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <h1>Wavy Audio Streaming Test</h1>
    
    <div id="emisor-section">
        <h2>Emisor (DJ)</h2>
        <input type="file" id="audioFile" accept="audio/*">
        <br><br>
        <audio id="emisorAudio" controls></audio>
        <br><br>
        <button id="createWave">Crear Wave</button>
        <button id="startStream">Iniciar Stream</button>
        <button id="stopStream">Detener Stream</button>
        <div id="emisorStatus"></div>
    </div>

    <hr>

    <div id="oyente-section">
        <h2>Oyente</h2>
        <button id="getWaves">Ver Waves Disponibles</button>
        <div id="wavesList"></div>
        <br>
        <audio id="oyenteAudio" controls></audio>
        <div id="trackInfo"></div>
        <div id="oyenteStatus"></div>
    </div>

    <script>
        const socket = io();
        let waveId = null;
        let audioContext = null;
        let mediaRecorder = null;
        let isStreaming = false;

        // Elementos DOM
        const audioFile = document.getElementById('audioFile');
        const emisorAudio = document.getElementById('emisorAudio');
        const oyenteAudio = document.getElementById('oyenteAudio');
        const createWaveBtn = document.getElementById('createWave');
        const startStreamBtn = document.getElementById('startStream');
        const stopStreamBtn = document.getElementById('stopStream');
        const getWavesBtn = document.getElementById('getWaves');
        const emisorStatus = document.getElementById('emisorStatus');
        const oyenteStatus = document.getElementById('oyenteStatus');
        const wavesList = document.getElementById('wavesList');
        const trackInfo = document.getElementById('trackInfo');

        // Conectar usuario
        socket.emit('user-connected', { userId: 'test-user-' + Date.now() });

        // Cargar archivo de audio
        audioFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                emisorAudio.src = url;
                emisorStatus.innerHTML = `Archivo cargado: ${file.name}`;
            }
        });

        // Crear wave
        createWaveBtn.addEventListener('click', () => {
            socket.emit('create-wave', {
                userId: 'emisor-' + Date.now(),
                name: 'Test Audio Wave',
                djName: 'DJ Test'
            });
        });

        // Iniciar streaming
        startStreamBtn.addEventListener('click', async () => {
            if (!emisorAudio.src || isStreaming) return;

            try {
                // Crear contexto de audio
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaElementSource(emisorAudio);
                const destination = audioContext.createMediaStreamDestination();
                source.connect(destination);
                source.connect(audioContext.destination);

                // Configurar MediaRecorder para capturar audio
                mediaRecorder = new MediaRecorder(destination.stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0 && waveId) {
                        // Convertir a base64 para envío
                        const reader = new FileReader();
                        reader.onload = () => {
                            socket.emit('audio-stream', {
                                waveId: waveId,
                                audioData: reader.result,
                                timestamp: Date.now()
                            });
                        };
                        reader.readAsDataURL(event.data);
                    }
                };

                mediaRecorder.start(100); // Enviar chunks cada 100ms
                emisorAudio.play();
                isStreaming = true;
                emisorStatus.innerHTML = '🔴 Streaming en vivo...';

                // Enviar info de la canción
                socket.emit('track-info', {
                    waveId: waveId,
                    trackInfo: {
                        title: audioFile.files[0]?.name || 'Audio Stream',
                        artist: 'DJ Test',
                        duration: emisorAudio.duration
                    }
                });

                // Sincronizar reproducción cada segundo
                setInterval(() => {
                    if (isStreaming && waveId) {
                        socket.emit('playback-sync', {
                            waveId: waveId,
                            currentTime: emisorAudio.currentTime,
                            isPlaying: !emisorAudio.paused
                        });
                    }
                }, 1000);

            } catch (error) {
                console.error('Error iniciando stream:', error);
                emisorStatus.innerHTML = '❌ Error iniciando stream';
            }
        });

        // Detener streaming
        stopStreamBtn.addEventListener('click', () => {
            if (mediaRecorder) {
                mediaRecorder.stop();
                mediaRecorder = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            emisorAudio.pause();
            isStreaming = false;
            emisorStatus.innerHTML = '⏹️ Stream detenido';
        });

        // Ver waves disponibles
        getWavesBtn.addEventListener('click', () => {
            socket.emit('get-online-waves', { userRole: 'oyente' });
        });

        // Eventos del socket
        socket.on('wave-online', (wave) => {
            waveId = wave._id || wave.id;
            emisorStatus.innerHTML = `✅ Wave creada: ${wave.name} (ID: ${waveId})`;
        });

        socket.on('online-waves', (waves) => {
            wavesList.innerHTML = '<h3>Waves Disponibles:</h3>';
            waves.forEach(wave => {
                const waveDiv = document.createElement('div');
                waveDiv.innerHTML = `
                    <p><strong>${wave.name}</strong> - DJ: ${wave.djName} (${wave.listenersCount} oyentes)</p>
                    <button onclick="joinWave('${wave._id || wave.id}')">Unirse</button>
                `;
                wavesList.appendChild(waveDiv);
            });
        });

        socket.on('audio-data', (data) => {
            // Reproducir audio recibido
            const audioBlob = dataURLtoBlob(data.audioData);
            const audioUrl = URL.createObjectURL(audioBlob);
            
            // Crear nuevo elemento audio para reproducir el chunk
            const tempAudio = new Audio(audioUrl);
            tempAudio.play().catch(e => console.log('Error reproduciendo audio:', e));
            
            oyenteStatus.innerHTML = '🎵 Recibiendo audio en tiempo real...';
        });

        socket.on('current-track', (track) => {
            trackInfo.innerHTML = `
                <h3>Reproduciendo Ahora:</h3>
                <p><strong>${track.title}</strong></p>
                <p>Artista: ${track.artist}</p>
            `;
        });

        socket.on('sync-playback', (data) => {
            oyenteStatus.innerHTML = `⏱️ Sync: ${data.currentTime.toFixed(1)}s - ${data.isPlaying ? 'Reproduciendo' : 'Pausado'}`;
        });

        // Función para unirse a wave
        window.joinWave = (id) => {
            socket.emit('join-wave', {
                waveId: id,
                userId: 'oyente-' + Date.now()
            });
            oyenteStatus.innerHTML = `✅ Conectado a wave: ${id}`;
        };

        // Función auxiliar para convertir dataURL a Blob
        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) {
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8arr], { type: mime });
        }
    </script>
</body>
</html>
